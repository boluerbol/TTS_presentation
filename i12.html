<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Thank You / Q&amp;A</title>
<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&amp;family=Inter:wght@300;400;500;600&amp;family=Roboto+Mono:wght@400;500&amp;display=swap" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
<style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0B1120;
            color: white;
            font-family: 'Inter', sans-serif;
            /* overflow:hidden; */
        }

        .slide-container {
            width: 1280px;
            height: 720px;
            padding: 60px 80px;
            box-sizing: border-box;
            background-color: #0B1120;
            display: flex;
            flex-direction: column;
            position: relative;
            align-items: center;
            justify-content: center;
        }

        /* Background Pattern */
        .bg-pattern {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0.1;
            background-image: radial-gradient(#334155 1px, transparent 1px);
            background-size: 30px 30px;
        }

        /* Waveform Visualization */
        .waveform-container {
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 200px;
            transform: translateY(-50%);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            z-index: 1;
            opacity: 0.15;
            pointer-events: none;
        }

        .wave-bar {
            width: 8px;
            background-color: #22d3ee;
            border-radius: 4px;
            animation: none; /* Static for PDF export safety */
        }

        /* Main Content */
        .content-wrapper {
            z-index: 10;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            flex: 1;
            justify-content: center;
        }

        .main-heading {
            font-family: 'Montserrat', sans-serif;
            font-size: 80px;
            font-weight: 800;
            margin: 0;
            line-height: 1.1;
            background-color: #22d3ee;
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent; /* Fallback: color will be set by JS or use solid color if gradient fails */
            color: #22d3ee; /* Solid color fallback */
            text-shadow: 0 4px 20px rgba(34, 211, 238, 0.3);
            margin-bottom: 10px;
        }

        .sub-heading {
            font-family: 'Montserrat', sans-serif;
            font-size: 32px;
            font-weight: 600;
            color: white;
            margin-bottom: 40px;
            opacity: 0.9;
        }

        .qa-prompt {
            font-size: 24px;
            color: #94a3b8;
            margin-bottom: 60px;
            font-weight: 300;
            letter-spacing: 0.05em;
        }

        .qa-prompt strong {
            color: #fff;
            font-weight: 600;
        }

        /* Contact Grid */
        .contact-grid {
            display: flex;
            gap: 40px;
            margin-bottom: 60px;
            background-color: rgba(30, 41, 59, 0.6);
            padding: 24px 40px;
            border-radius: 16px;
            border: 1px solid rgba(51, 65, 85, 0.5);
            backdrop-filter: blur(5px);
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 12px;
            font-family: 'Roboto Mono', monospace;
            font-size: 14px;
            color: #cbd5e1;
        }

        .contact-icon {
            color: #22d3ee;
            font-size: 18px;
        }

        /* Footer Logos */
        .footer {
            margin-top: auto;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding-top: 30px;
            border-top: 1px solid rgba(51, 65, 85, 0.5);
            z-index: 10;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .org-name {
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 18px;
            color: white;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .divider {
            height: 24px;
            width: 2px;
            background-color: #475569;
        }

        .org-sub {
            font-size: 14px;
            color: #94a3b8;
            font-weight: 500;
            text-transform: none;
        }

    </style>
</head>
<body>
<div class="slide-container">
<!-- Background -->
<div class="bg-pattern"></div>
<!-- Decorative Waveform Ribbon -->
<div class="waveform-container">
<!-- Manually creating a stylized wave pattern with divs -->
<div class="wave-bar" style="height: 40px; opacity: 0.3;"></div>
<div class="wave-bar" style="height: 60px; opacity: 0.5;"></div>
<div class="wave-bar" style="height: 40px; opacity: 0.3;"></div>
<div class="wave-bar" style="height: 80px; opacity: 0.6;"></div>
<div class="wave-bar" style="height: 120px; opacity: 0.8;"></div>
<div class="wave-bar" style="height: 70px; opacity: 0.5;"></div>
<div class="wave-bar" style="height: 100px; opacity: 0.7;"></div>
<div class="wave-bar" style="height: 140px; opacity: 0.9;"></div>
<div class="wave-bar" style="height: 90px; opacity: 0.6;"></div>
<div class="wave-bar" style="height: 160px; opacity: 1.0;"></div>
<div class="wave-bar" style="height: 110px; opacity: 0.7;"></div>
<div class="wave-bar" style="height: 180px; opacity: 1.0;"></div>
<div class="wave-bar" style="height: 130px; opacity: 0.8;"></div>
<div class="wave-bar" style="height: 150px; opacity: 0.9;"></div>
<div class="wave-bar" style="height: 100px; opacity: 0.6;"></div>
<div class="wave-bar" style="height: 120px; opacity: 0.8;"></div>
<div class="wave-bar" style="height: 60px; opacity: 0.4;"></div>
<div class="wave-bar" style="height: 90px; opacity: 0.6;"></div>
<div class="wave-bar" style="height: 50px; opacity: 0.3;"></div>
<div class="wave-bar" style="height: 70px; opacity: 0.5;"></div>
<div class="wave-bar" style="height: 40px; opacity: 0.3;"></div>
<div class="wave-bar" style="height: 30px; opacity: 0.2;"></div>
</div>
<!-- Main Content -->
<div class="content-wrapper">
<h1 class="main-heading">Рахмат!</h1>
<h2 class="sub-heading">Thank You!</h2>
<div class="qa-prompt">
<p>Суроолор барбы? <span>/</span> <strong>Questions?</strong></p>
</div>
<button onclick="location.href='index.html'">Next</button>

<!-- Contact Info -->
<div class="contact-grid">
<div class="contact-item">
<i class="fas fa-envelope contact-icon"></i>
<p>boluerbol@gmail.com</p>
</div>

<div class="contact-item">
<i class="fas fa-globe contact-icon"></i>
<p>www.alatoo.edu.kg</p>
</div>
</div>
</div>
<!-- Footer Logos -->
<div class="footer">
<div class="logo-container">
<div class="org-name">
<i class="fas fa-laptop-code" style="color: #22d3ee;"></i>
<p> <span style="font-weight: 400; color: #94a3b8;"></span></p>
</div>
<div class="divider"></div>
<div class="org-name">
<i class="fas fa-university" style="color: #c084fc;"></i>
<p class="org-sub">National Commission on State Language</p>
</div>
</div>
</div>
</div>
</body>
</html>
